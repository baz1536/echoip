name: ci

on:
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: install go
        uses: actions/setup-go@v2
        with:
          go-version-file: go.mod

      - name: test
        run: make test

name: Release

on:
  push:
    branches: [master]

jobs:
  build-and-deploy:
    if: "!contains(github.event.head_commit.message, '[skip deploy]')"
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: install go
        uses: actions/setup-go@v2
        with:
          go-version: 1.24

      - name: test
        run: make test

      - name: Log in to registry
        uses: docker/login-action@v3
        with:
          registry: docker.dbrose.uk
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Read version
        id: version
        run: echo "version=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            docker.dbrose.uk/${{ vars.IMAGE_NAME }}:${{ steps.version.outputs.version }}
            docker.dbrose.uk/${{ vars.IMAGE_NAME }}:latest

      - name: Deploy via Portainer API
        if: vars.FIRST_PUSH_DONE == 'true'
        env:
          PORTAINER_URL: ${{ vars.PORTAINER_URL }}
          PORTAINER_API_KEY: ${{ secrets.PORTAINER_API_KEY }}
          STACK_ID: ${{ vars.PORTAINER_STACK_ID }}
          ENDPOINT_ID: ${{ vars.PORTAINER_ENDPOINT_ID }}
        run: |
          STACK_FILE=$(curl -sf "$PORTAINER_URL/api/stacks/$STACK_ID/file" \
            -H "X-API-Key: $PORTAINER_API_KEY" | jq -r '.StackFileContent')
          curl -sf -X PUT "$PORTAINER_URL/api/stacks/$STACK_ID?endpointId=$ENDPOINT_ID" \
            -H "X-API-Key: $PORTAINER_API_KEY" \
            -H "Content-Type: application/json" \
            -d "{\"stackFileContent\": $(echo "$STACK_FILE" | jq -Rs .), \"pullImage\": true}"

      - name: Purge unused remote images
        if: vars.FIRST_PUSH_DONE == 'true'
        env:
          PORTAINER_URL: ${{ vars.PORTAINER_URL }}
          PORTAINER_API_KEY: ${{ secrets.PORTAINER_API_KEY }}
          ENDPOINT_ID: ${{ vars.PORTAINER_ENDPOINT_ID }}
        run: |
          curl -sf -X POST \
            "$PORTAINER_URL/api/endpoints/$ENDPOINT_ID/docker/images/prune?filters=%7B%22dangling%22%3A%7B%22false%22%3Atrue%7D%7D" \
            -H "X-API-Key: $PORTAINER_API_KEY"

name: SBOM Generation and Upload

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  sbom:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install CycloneDX Go
        run: go install github.com/CycloneDX/cyclonedx-gomod/cmd/cyclonedx-gomod@latest

      - name: Generate SBOM
        run: cyclonedx-gomod app -output sbom.json -json -main cmd/echoip

      - name: Archive SBOM as artefact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ github.sha }}
          path: sbom.json
          retention-days: 365

      - name: Read version
        id: version
        run: echo "version=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Upload SBOM to Dependency-Track
        run: |
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            --request POST "${{ vars.DEPTRACK_URL }}/api/v1/bom" \
            --header "X-Api-Key: ${{ secrets.DEPTRACK_API_KEY }}" \
            --form "projectName=echoip" \
            --form "projectVersion=latest" \
            --form "autoCreate=true" \
            --form "bom=@sbom.json")
          echo "HTTP response: $HTTP_CODE"
          if [[ "$HTTP_CODE" -lt 200 || "$HTTP_CODE" -ge 300 ]]; then
            echo "❌ Upload failed with HTTP $HTTP_CODE"
            exit 1
          fi
          echo "✅ SBOM uploaded successfully"

      - name: Tag project with current version
        run: |
          PROJECT=$(curl -s "${{ vars.DEPTRACK_URL }}/api/v1/project?name=echoip&version=latest" \
            --header "X-Api-Key: ${{ secrets.DEPTRACK_API_KEY }}" | jq '.[0]')
          UPDATED=$(echo "$PROJECT" | jq --arg tag "${{ steps.version.outputs.version }}" '{uuid, name, version, classifier, active, tags: [{"name": $tag}]}')
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
            "${{ vars.DEPTRACK_URL }}/api/v1/project" \
            --header "X-Api-Key: ${{ secrets.DEPTRACK_API_KEY }}" \
            --header "Content-Type: application/json" \
            --data "$UPDATED")
          echo "HTTP response: $HTTP_CODE"
          if [[ "$HTTP_CODE" -lt 200 || "$HTTP_CODE" -ge 300 ]]; then
            echo "❌ Tag update failed with HTTP $HTTP_CODE"
            exit 1
          fi
          echo "✅ Tagged as ${{ steps.version.outputs.version }}"

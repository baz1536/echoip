name: SBOM Generation and Upload

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  sbom:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install CycloneDX Go
        run: go install github.com/CycloneDX/cyclonedx-gomod/cmd/cyclonedx-gomod@latest

      - name: Generate SBOM
        run: cyclonedx-gomod app -output sbom.json -json -main cmd/echoip

      - name: Archive SBOM as artefact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ github.sha }}
          path: sbom.json
          retention-days: 365

      - name: Upload SBOM to Dependency-Track
        run: |
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            --request POST "${{ vars.DEPTRACK_URL }}/api/v1/bom" \
            --header "X-Api-Key: ${{ secrets.DEPTRACK_API_KEY }}" \
            --form "projectName=echoip" \
            --form "projectVersion=latest" \
            --form "autoCreate=true" \
            --form "bom=@sbom.json")
          echo "HTTP response: $HTTP_CODE"
          if [[ "$HTTP_CODE" -lt 200 || "$HTTP_CODE" -ge 300 ]]; then
            echo "❌ Upload failed with HTTP $HTTP_CODE"
            exit 1
          fi
          echo "✅ SBOM uploaded successfully"
